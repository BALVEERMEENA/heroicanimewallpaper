<!DOCTYPE html>
<html>
<head>
<title>The Heroic Anime Wallpaper</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
}

/* PREMIUM HEADER */
header{
background:linear-gradient(135deg,#000000,#1a1a1a);
padding:30px;
text-align:center;
border-bottom:1px solid #333;
box-shadow:0 0 20px rgba(0,0,0,0.8);
}

/* COLORFUL TITLE */
.title{
font-size:40px;
font-weight:bold;
margin:0;
background: linear-gradient(45deg, #ff4d4d, #ffcc00, #00ffff, #ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TAGLINE */
.tagline{
color:#ddd;
font-size:16px;
margin-top:10px;
letter-spacing:2px;
}

/* SUBTEXT */
.subtext{
color:#aaa;
font-size:13px;
margin-top:5px;
}

.searchBox{text-align:center;margin:30px;}

.searchBox input{
width:360px;
padding:12px;
border-radius:30px;
border:none;
outline:none;
}

/* Suggestions */
#suggestions{
text-align:center;
color:#aaa;
margin-top:-20px;
}

/* MENU */
.menu{
position:fixed;
top:20px;
right:25px;
font-size:30px;
cursor:pointer;
}

.menuBox{
display:none;
position:fixed;
top:60px;
right:20px;
background:#111;
border:1px solid #444;
padding:10px;
border-radius:10px;
}

.menuBox div{
padding:8px;
cursor:pointer;
}
.menuBox div:hover{background:#333;}

/* UPLOAD */
#uploadForm{
display:none;
text-align:center;
margin-top:20px;
}

#uploadForm input{
display:block;
margin:10px auto;
padding:8px;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.wallpaper{
background:#111;
padding:10px;
border-radius:10px;
text-align:center;
}

.wallpaper img{
width:220px;
height:220px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

button{
background:black;
color:white;
border:1px solid white;
padding:6px 12px;
margin-top:5px;
cursor:pointer;
}

/* VIEWER */
#viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
}

#viewer img{
max-width:90%;
max-height:90%;
}
</style>
</head>

<body>

<header>
<h1 class="title">Heroic Anime Wallpapers</h1>

<p class="tagline">Welcome to the Ultimate Anime Wallpaper Collection</p>

<p class="subtext">Explore • Download • Enjoy HD Wallpapers</p>

<p class="subtext">Made by Upendra Devishankar Meena</p>
</header>

<div class="menu" onclick="openMenu()">☰</div>

<div class="menuBox" id="menuBox">
<div onclick="showUpload()">Upload Wallpaper</div>
</div>

<div class="searchBox">
<input type="text" id="searchInput" placeholder="Search wallpapers" onkeyup="searchWallpaper()">
</div>

<div id="suggestions"></div>

<div id="uploadForm">
<h3>Upload Wallpaper</h3>
<input id="wallName" placeholder="Wallpaper Name">
<input type="file" id="fileInput">
<button onclick="uploadImage()">Upload</button>
</div>

<div class="gallery" id="gallery"></div>

<div id="viewer" onclick="closeViewer()">
<img id="viewerImg">
</div>

<script>

let password="20520125";

/* MENU */
function openMenu(){
let code=prompt("Enter menu password");
if(code===password){
document.getElementById("menuBox").style.display="block";
}else{
alert("Menu locked");
}
}

/* SHOW UPLOAD */
function showUpload(){
document.getElementById("uploadForm").style.display="block";
}

/* UPLOAD + SAVE */
function uploadImage(){

let wall=document.getElementById("wallName").value;
let file=document.getElementById("fileInput").files[0];

if(!wall||!file){
alert("Fill all fields");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let imageData=e.target.result;

let wallpapers=JSON.parse(localStorage.getItem("walls")) || [];

wallpapers.push({
name:wall,
img:imageData
});

localStorage.setItem("walls", JSON.stringify(wallpapers));

displayWallpapers();

};

reader.readAsDataURL(file);

}

/* DISPLAY */
function displayWallpapers(){

let gallery=document.getElementById("gallery");
gallery.innerHTML="";

let wallpapers=JSON.parse(localStorage.getItem("walls")) || [];

wallpapers.forEach(function(w){

let div=document.createElement("div");
div.className="wallpaper";
div.setAttribute("data-name", w.name.toLowerCase());

div.innerHTML=`
<img src="${w.img}" onclick="openViewer(this.src)">
<p>${w.name}</p>
<button onclick="downloadImage('${w.img}')">Download</button>
`;

gallery.appendChild(div);

});

}

/* DOWNLOAD */
function downloadImage(url){
let a=document.createElement("a");
a.href=url;
a.download="wallpaper";
a.click();
}

/* SEARCH */
function searchWallpaper(){

let input=document.getElementById("searchInput").value.toLowerCase();
let walls=document.querySelectorAll(".wallpaper");
let suggestionsBox=document.getElementById("suggestions");

suggestionsBox.innerHTML="";

walls.forEach(function(w){

let name=w.getAttribute("data-name");

if(name.includes(input)){
w.style.display="block";
}else{
w.style.display="none";
}

});

}

/* VIEW */
function openViewer(src){
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src=src;
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}

/* LOAD DATA */
window.onload=function(){
displayWallpapers();
};

</script>

</body>
</html>
